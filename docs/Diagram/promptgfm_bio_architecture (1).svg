<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<style>
  svg { font-family: "Helvetica Neue", Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 2; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- GROUP: Text encoder -->
<rect x="18" y="18" width="188" height="200" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="112" y="36" text-anchor="middle">Text encoder</text>

<!-- Disease A -->
<rect x="34" y="52" width="156" height="34" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="112" y="69" text-anchor="middle" dominant-baseline="central" fill="#712B13">Disease A description</text>
<!-- Disease B -->
<rect x="34" y="94" width="156" height="34" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text class="ts" x="112" y="111" text-anchor="middle" dominant-baseline="central" fill="#72243E">Disease B description</text>

<!-- PubMedBERT -->
<rect x="34" y="148" width="156" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="112" y="168" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">PubMedBERT</text>
<text class="ts" x="112" y="188" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Frozen · CLS · 768-d</text>

<!-- Arrows: diseases → BERT -->
<line x1="112" y1="86" x2="112" y2="92" class="arr" marker-end="url(#arrow)"/>
<line x1="112" y1="128" x2="112" y2="146" class="arr" marker-end="url(#arrow)"/>

<!-- Arrow: BERT → conditioning -->
<line x1="190" y1="176" x2="224" y2="176" class="arr" marker-end="url(#arrow)"/>

<!-- GROUP: FiLM conditioning -->
<rect x="222" y="18" width="128" height="200" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="286" y="36" text-anchor="middle">Conditioning</text>

<!-- FiLM MLP -->
<rect x="238" y="100" width="112" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="294" y="116" text-anchor="middle" dominant-baseline="central" fill="#085041">FiLM</text>
<text class="ts" x="294" y="134" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">γ, β = MLP(p)</text>

<rect x="238" y="156" width="112" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="294" y="173" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">h′ = γ ⊙ h + β</text>

<!-- Arrow BERT → FiLM -->
<path d="M224 176 L236 176 L236 122 L236 122" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- GROUP: GNN backbone -->
<rect x="368" y="18" width="160" height="200" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="448" y="36" text-anchor="middle">GNN backbone</text>

<!-- GraphSAGE layers -->
<rect x="384" y="52" width="128" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="448" y="69" text-anchor="middle" dominant-baseline="central" fill="#3C3489">GraphSAGE L1 (128)</text>
<rect x="384" y="100" width="128" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="448" y="117" text-anchor="middle" dominant-baseline="central" fill="#3C3489">GraphSAGE L2 (512)</text>
<rect x="384" y="148" width="128" height="34" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="448" y="165" text-anchor="middle" dominant-baseline="central" fill="#3C3489">GraphSAGE L3 (512)</text>

<!-- Arrows between layers -->
<line x1="448" y1="86" x2="448" y2="98" class="arr" marker-end="url(#arrow)"/>
<line x1="448" y1="134" x2="448" y2="146" class="arr" marker-end="url(#arrow)"/>

<!-- FiLM conditioning arrows -->
<line x1="350" y1="69" x2="382" y2="69" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrowTeal)" stroke-dasharray="3 2"/>
<line x1="350" y1="117" x2="382" y2="117" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrowTeal)" stroke-dasharray="3 2"/>
<line x1="350" y1="165" x2="382" y2="165" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrowTeal)" stroke-dasharray="3 2"/>

<!-- GROUP: Prediction head -->
<rect x="546" y="18" width="118" height="200" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="605" y="36" text-anchor="middle">Prediction head</text>

<!-- Predictor MLP -->
<rect x="558" y="80" width="94" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="605" y="100" text-anchor="middle" dominant-baseline="central" fill="#0C447C">MLP</text>
<text class="ts" x="605" y="120" text-anchor="middle" dominant-baseline="central" fill="#185FA5">hidden = 256</text>

<!-- Score output -->
<rect x="562" y="160" width="86" height="34" rx="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="605" y="177" text-anchor="middle" dominant-baseline="central" fill="#27500A">Score</text>

<!-- Arrow: GNN → predictor -->
<path d="M520 165 L536 165 L536 108 L556 108" fill="none" class="arr" marker-end="url(#arrow)"/>
<line x1="512" y1="165" x2="520" y2="165" fill="none" stroke="#888780" stroke-width="0.5"/>

<!-- Arrow: predictor → score -->
<line x1="605" y1="136" x2="605" y2="158" class="arr" marker-end="url(#arrow)"/>

<!-- Disease embedding → predictor (concat) -->
<path d="M294 196 L294 240 L540 240 L540 108 L556 108" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrowTeal)" stroke-dasharray="3 2"/>
<text class="ts" x="418" y="254" text-anchor="middle">concat(gene_emb, disease_emb)</text>

<!-- BIOLOGICAL KNOWLEDGE GRAPH -->
<rect x="18" y="290" width="510" height="230" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="273" y="308" text-anchor="middle">Biological knowledge graph</text>

<!-- Data sources -->
<rect x="34" y="324" width="110" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="89" y="341" text-anchor="middle" dominant-baseline="central" fill="#633806">STRING PPI</text>
<rect x="34" y="368" width="110" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="89" y="385" text-anchor="middle" dominant-baseline="central" fill="#633806">BioGRID PPI</text>
<rect x="34" y="412" width="110" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="89" y="429" text-anchor="middle" dominant-baseline="central" fill="#633806">DisGeNET</text>
<rect x="34" y="456" width="110" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="89" y="473" text-anchor="middle" dominant-baseline="central" fill="#633806">HPO</text>
<rect x="34" y="496" width="110" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="89" y="513" text-anchor="middle" dominant-baseline="central" fill="#633806">Orphanet</text>

<!-- Graph visualization -->
<rect x="182" y="324" width="180" height="180" rx="8" fill="#F8F7F4" stroke="#D3D1C7" stroke-width="0.5"/>

<!-- Mini graph edges -->
<line x1="220" y1="370" x2="255" y2="350" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="255" y1="350" x2="290" y2="380" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="255" y1="350" x2="310" y2="350" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="290" y1="380" x2="240" y2="410" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="290" y1="380" x2="330" y2="400" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="310" y1="350" x2="345" y2="360" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="330" y1="400" x2="345" y2="360" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="240" y1="410" x2="275" y2="430" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="275" y1="430" x2="310" y2="450" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="310" y1="450" x2="350" y2="440" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="330" y1="400" x2="350" y2="440" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="220" y1="370" x2="240" y2="410" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="225" y1="460" x2="275" y2="430" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>
<line x1="225" y1="460" x2="240" y2="410" stroke="#AFA9EC" stroke-width="0.8" opacity="0.5"/>

<!-- Mini graph nodes -->
<circle cx="220" cy="370" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="255" cy="350" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="290" cy="380" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="240" cy="410" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="310" cy="350" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="275" cy="430" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="330" cy="400" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="345" cy="360" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="310" cy="450" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="350" cy="440" r="5" fill="#7F77DD" opacity="0.7"/>
<circle cx="225" cy="460" r="5" fill="#7F77DD" opacity="0.7"/>

<!-- Arrows: sources → graph -->
<line x1="144" y1="341" x2="180" y2="370" class="arr" marker-end="url(#arrow)"/>
<line x1="144" y1="385" x2="180" y2="395" class="arr" marker-end="url(#arrow)"/>
<line x1="144" y1="429" x2="180" y2="420" class="arr" marker-end="url(#arrow)"/>
<line x1="144" y1="473" x2="180" y2="450" class="arr" marker-end="url(#arrow)"/>
<line x1="144" y1="513" x2="180" y2="475" class="arr" marker-end="url(#arrow)"/>

<!-- Arrow: graph → GNN -->
<path d="M362 414 L448 414 L448 220 L448 184" fill="none" class="arr" marker-end="url(#arrow)"/>

<!-- Graph stats -->
<text class="ts" x="400" y="340">19,576 genes</text>
<text class="ts" x="400" y="358">16,841 diseases</text>
<text class="ts" x="400" y="376">1.85M PPI edges</text>

<!-- Annotation -->
<text class="ts" x="400" y="480">Same graph,</text>
<text class="ts" x="400" y="496">different conditioning</text>
<text class="ts" x="400" y="512">per disease prompt</text>

<!-- Full-vocabulary label -->
<text class="ts" x="605" y="210" text-anchor="middle">Full-vocabulary</text>
<text class="ts" x="605" y="226" text-anchor="middle">gene ranking</text>
</svg>