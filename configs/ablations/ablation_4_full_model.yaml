experiment_name: "ablation_4_full_model"
model:
  name: promptgfm_film
  use_prompt: true
  prompt_encoder:
    model_name: microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext
    pooling_strategy: cls
    max_length: 512
    freeze_encoder: true
  gnn_type: graphsage
  hidden_dim: 512
  num_layers: 3
  dropout: 0.3
  conditioning_type: film
  prompt_dim: 768
  gene_feature_dim: 128
  disease_feature_dim: 128
  phenotype_feature_dim: 128
  prediction_hidden_dim: 256
  use_gnn: true         # ablation: GraphSAGE message passing ON (PPI edges active)
  use_conditioning: true # ablation: FiLM conditioning ON — full model
training:
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.999
  num_epochs: 100
  batch_size: 768
  gradient_clip: 1.0
  accumulation_steps: 1
  loss_type: combined
  loss_weights:
    bce: 1.0
    ranking: 0.5
    listnet: 0.3
  margin: 0.5
  early_stopping_patience: 15
  min_delta: 0.0001
  lr_scheduler: cosine
  lr_warmup_epochs: 5
  lr_min: 1e-6
  save_best: true
  save_last: true
  save_interval: 1
  checkpoint_dir: checkpoints/ablation_4_full_model
  pretrained_checkpoint: null
  gradient_accumulation_steps: 1
data:
  graph_file: data/processed/biomedical_graph.pt
  edge_file: data/processed/hpo_gene_disease_edges.csv
  min_score: 0.3
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: 42
  num_negatives: 5
  negative_sampling_strategy: random
  use_disease_descriptions: true
  use_phenotype_lists: true
  max_phenotypes_per_disease: 20
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
evaluation:
  metrics:
  - auroc
  - aupr
  - precision_at_k
  - recall_at_k
  - map
  - mrr
  - ndcg_at_k
  - hit_rate_at_k
  k_values:
  - 10
  - 20
  - 50
  - 100
  stratify_by_rarity: true
  rarity_thresholds:
    ultra_rare: 2
    very_rare: 5
    rare: 15
    common: 1000
  few_shot_k:
  - 1
  - 3
  - 5
  - 10
  evaluate_on:
  - val
  - test
case_studies:
  enabled: true
  studies:
  - name: angelman
    known_genes:
    - UBE3A
  - name: rett
    known_genes:
    - MECP2
  - name: fragile_x
    known_genes:
    - FMR1
logging:
  use_wandb: false
  wandb_project: promptgfm-bio
  wandb_run_name: kaggle_t4_run
  wandb_entity: null
  wandb_tags:
  - promptgfm
  - film
  - kaggle
  - rare-disease
  log_interval: 20
  log_gradients: false
  log_model_architecture: true
hardware:
  device: cuda
  mixed_precision: true
  gpu_memory_fraction: 0.92
seed: 42
deterministic: false
benchmark: true
